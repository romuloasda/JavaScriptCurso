<!DOCTYPE html>
<html lang="en">
<head>

			<input type="submit" value="Mostrar Tabuada">	
		</form>
		<p id="tabuada"></p>
		<br>
	</div>
	<div>
		<h1>Programa Números Decrecentes</h1>
		<form id="formulario2">
			<p>Numéro:
				<input type="number" id="inNumero2">
			</p>
				<input type="submit" value="Decrescente até 0">
				<p id="decrescente"></p>
		</form>
	</div>
	<h3></h3>
	<script src="./js/script.js"></script>
	
</body>
</html>
