<!DOCTYPE html>
<html lang="pt-br">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Document</title>
</head>
<body>
	<div>
		<h1> Programa Contas do Mês</h1>
		<form>
			<p>Descrição da conta:
				<input type="text" id="inDescricao">
			</p>
			<p>Valor da conta:
				<input type="number" id="inValor" min="0" placeholder="0" required>
			</p>
			<input type="submit" value="Resgistrar Conta">
		</form>
		<p id="resposta"><br></p>
		<h3 id="resposta2"></h3>
	</div>
	<div>
		<h1>Programa Números Primos</h1>
		<form id="form2">
			<p>Numero:
				<input type="number" id="inNumero" required>
			</p>
			<input type="submit">
			<p id="resposta3"><br></p>
		</form>
	</div>
	<div>
		<h1>Fabrica de Estrelas</h1>
		<form id="form3">
			<p>Numero:
				<input type="text" id="inSimbolo" required>
			</p>
			<input type="submit">
			<p id="resposta4"><br></p>
		</form>
	</div>
	<div>
		<h1>Programa Repetir Fruta</h1>
		<form id="form4">
			<p>Fruta:
				<input type="text" id="inFruta">
			</p>
			<p>Numero:
				<input type="number" id="inNum" required>
			</p>
			<input type="submit">
			<p id="resposta5"><br></p>
		</form>
	</div>
		<div>
		<h1>Programa Criação de Chinelas</h1>
		<form id="form5">
			<p>Fruta:
				<input type="number" id="inFruta">
			</p>
			<p>Numero:
				<input type="number" id="inAnos" required>
			</p>
			<input type="submit">
			<p id="resposta6"><br></p>
		</form>
	</div>
	<script src="./js/script.js"></script>
</body>
</html>
