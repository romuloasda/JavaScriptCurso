<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<link rel="stylesheet" href="../CSS/estilo.css">
	</head>
	<body id="exercicio">
		<div id="primeiro">#primeiro</div>
		<div id="segundo">#segundo</div>
		<div id="terceiro">#terceiro</div>	
		<div id="terceiro">#quarto</div>	
		<div id="terceiro">#quinto</div>	

		<script>
			//HTMLCollection (não é um array)
			const divs = document.getElementsByTagName('div')
			
			//Loop #01
			for(const elemento of divs) {
				elemento.classList.add('destaque')
			}

			// Loop #02
			const array1 = Array.from(divs)
			array1.forEach((el, i) => {
				if(i % 2) {
				el.classList.remove('destaque')
				}
			})

			// Loop #3
			const array = [...divs]
			array.forEach((el, i) => {
				const ultimo = array.length - 1 === i
				if(ultimo) {
					el.classList.remove('destaque')
				}
			})
		</script>
	</body>
</html>
