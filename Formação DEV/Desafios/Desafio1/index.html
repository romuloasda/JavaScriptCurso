<!DOCTYPE html>
<html lang="pt-br">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="icon" href="./assents/cifra-cesar.jpg">
	<link rel="stylesheet" href="estilo.css">
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Noto+Sans:ital,wght@0,100..900;1,100..900&family=Roboto:ital,wght@0,100..900;1,100..900&family=Saira+Stencil:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
	<title>Cifra de Cesar</title>
</head>
<body>
	<img src="./assents/cifra-cesar.jpg" alt="" class="imagem"/>
	<h1 class="destaque">Criptograde a sua mensagen</h1>
	<div class="campo texto">
		<label for="para-criptografar">Digite a sua mensagem</label>
		<input type="text" class="entrada" id="para-criptografar">
	</div>
	<div class="campo seletor">
		<label for="deslocamento">Mudar o início do alfabeto para:</label>
		<select id="deslocamento" class="entrada">
			<option value=""></option>
		</select>
	</div>
	<button id="botao" class="botao">Criptografar</button>
	<p class="invisivel" id="resposta"></p>
	<script src="script.js"></script>
</body>
</html>
